<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI副業アフィリ記事ジェネレーター</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Zen+Kaku+Gothic+New:wght@400;700;900&family=Space+Mono:wght@400;700&display=swap');

  :root {
    --bg: #0a0a0f;
    --surface: #12121a;
    --card: #1a1a26;
    --accent: #00ff88;
    --accent2: #7c3aed;
    --accent3: #ff6b35;
    --text: #e8e8f0;
    --muted: #888899;
    --border: #2a2a3a;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Zen Kaku Gothic New', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* Grid background */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(0,255,136,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(0,255,136,0.03) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
    z-index: 0;
  }

  .container {
    position: relative;
    z-index: 1;
    max-width: 860px;
    margin: 0 auto;
    padding: 40px 20px 80px;
  }

  /* Header */
  header {
    text-align: center;
    margin-bottom: 48px;
  }

  .tag {
    display: inline-block;
    font-family: 'Space Mono', monospace;
    font-size: 11px;
    color: var(--accent);
    border: 1px solid var(--accent);
    padding: 4px 12px;
    letter-spacing: 2px;
    margin-bottom: 16px;
    text-transform: uppercase;
  }

  h1 {
    font-size: clamp(28px, 5vw, 44px);
    font-weight: 900;
    line-height: 1.2;
    letter-spacing: -1px;
  }

  h1 span {
    color: var(--accent);
    position: relative;
  }

  h1 span::after {
    content: '';
    position: absolute;
    bottom: -2px;
    left: 0;
    right: 0;
    height: 3px;
    background: var(--accent);
    border-radius: 2px;
  }

  .subtitle {
    color: var(--muted);
    margin-top: 12px;
    font-size: 14px;
  }

  /* Form card */
  .form-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 32px;
    margin-bottom: 24px;
    position: relative;
    overflow: hidden;
  }

  .form-card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 2px;
    background: linear-gradient(90deg, var(--accent2), var(--accent), var(--accent3));
  }

  .field {
    margin-bottom: 20px;
  }

  label {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 13px;
    font-weight: 700;
    color: var(--muted);
    letter-spacing: 1px;
    text-transform: uppercase;
    margin-bottom: 8px;
  }

  label .dot {
    width: 6px; height: 6px;
    background: var(--accent);
    border-radius: 50%;
    flex-shrink: 0;
  }

  input, textarea, select {
    width: 100%;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    color: var(--text);
    font-family: 'Zen Kaku Gothic New', sans-serif;
    font-size: 15px;
    padding: 12px 16px;
    outline: none;
    transition: border-color 0.2s, box-shadow 0.2s;
    appearance: none;
  }

  input:focus, textarea:focus, select:focus {
    border-color: var(--accent);
    box-shadow: 0 0 0 3px rgba(0,255,136,0.1);
  }

  textarea { resize: vertical; min-height: 80px; }

  .row {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 16px;
  }

  @media (max-width: 600px) { .row { grid-template-columns: 1fr; } }

  /* Tone chips */
  .tone-group {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
  }

  .tone-chip {
    padding: 7px 14px;
    border-radius: 100px;
    border: 1px solid var(--border);
    font-size: 13px;
    cursor: pointer;
    transition: all 0.2s;
    background: var(--surface);
    color: var(--muted);
    user-select: none;
  }

  .tone-chip.active {
    background: rgba(0,255,136,0.12);
    border-color: var(--accent);
    color: var(--accent);
  }

  /* Button */
  .btn {
    width: 100%;
    padding: 16px;
    border: none;
    border-radius: 12px;
    background: var(--accent);
    color: #000;
    font-family: 'Zen Kaku Gothic New', sans-serif;
    font-weight: 900;
    font-size: 17px;
    cursor: pointer;
    transition: all 0.2s;
    letter-spacing: 0.5px;
    position: relative;
    overflow: hidden;
  }

  .btn:hover:not(:disabled) {
    transform: translateY(-2px);
    box-shadow: 0 8px 24px rgba(0,255,136,0.3);
  }

  .btn:disabled {
    opacity: 0.5;
    cursor: not-allowed;
    transform: none;
  }

  .btn .spinner {
    display: none;
    width: 20px; height: 20px;
    border: 2px solid rgba(0,0,0,0.3);
    border-top-color: #000;
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
    margin: 0 auto;
  }

  @keyframes spin { to { transform: rotate(360deg); } }

  .btn.loading .btn-text { display: none; }
  .btn.loading .spinner { display: block; }

  /* Result */
  .result-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 16px;
    overflow: hidden;
    display: none;
    animation: fadeUp 0.4s ease;
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(16px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .result-card.visible { display: block; }

  .result-header {
    padding: 16px 24px;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .result-label {
    font-family: 'Space Mono', monospace;
    font-size: 11px;
    color: var(--accent);
    letter-spacing: 2px;
    text-transform: uppercase;
  }

  .copy-btn {
    background: rgba(0,255,136,0.1);
    border: 1px solid rgba(0,255,136,0.3);
    color: var(--accent);
    padding: 6px 16px;
    border-radius: 100px;
    font-size: 12px;
    font-family: 'Zen Kaku Gothic New', sans-serif;
    cursor: pointer;
    transition: all 0.2s;
  }

  .copy-btn:hover { background: rgba(0,255,136,0.2); }

  .result-body {
    padding: 28px;
    font-size: 15px;
    line-height: 1.9;
    white-space: pre-wrap;
    word-break: break-word;
  }

  /* Error */
  .error-msg {
    background: rgba(255,107,53,0.1);
    border: 1px solid rgba(255,107,53,0.3);
    color: var(--accent3);
    border-radius: 10px;
    padding: 12px 16px;
    font-size: 14px;
    display: none;
    margin-top: 12px;
  }

  .error-msg.visible { display: block; }

  /* Counter */
  .char-count {
    text-align: right;
    font-size: 11px;
    color: var(--muted);
    margin-top: 4px;
    font-family: 'Space Mono', monospace;
  }
</style>
</head>
<body>
<div class="container">

  <header>
    <div class="tag">🤖 AI-Powered</div>
    <h1>副業アフィリ<br><span>記事ジェネレーター</span></h1>
    <p class="subtitle">商品情報を入れるだけで、読まれる記事が完成する</p>
  </header>

  <div class="form-card">
    <div class="field">
      <label><span class="dot"></span>商品・サービス名</label>
      <input type="text" id="product" placeholder="例：ChatGPT Plus、〇〇の副業講座" />
    </div>

    <div class="row">
      <div class="field">
        <label><span class="dot"></span>ターゲット読者</label>
        <select id="target">
          <option value="副業初心者">副業初心者</option>
          <option value="AIに興味ある会社員">AIに興味ある会社員</option>
          <option value="フリーランス志望">フリーランス志望</option>
          <option value="主婦・主夫">主婦・主夫</option>
          <option value="20代〜30代の転職検討中">20代〜30代の転職検討中</option>
        </select>
      </div>
      <div class="field">
        <label><span class="dot"></span>記事の長さ</label>
        <select id="length">
          <option value="short">短め（SNS向け・500字）</option>
          <option value="medium" selected>普通（ブログ向け・1000字）</option>
          <option value="long">長め（note向け・1500字）</option>
        </select>
      </div>
    </div>

    <div class="field">
      <label><span class="dot"></span>商品の特徴・売りポイント</label>
      <textarea id="features" placeholder="例：月額2,000円で使い放題、初心者でもすぐ使える、返金保証あり"></textarea>
    </div>

    <div class="field">
      <label><span class="dot"></span>アフィリリンクURL</label>
      <input type="text" id="afflink" placeholder="https://..." />
    </div>

    <div class="field">
      <label><span class="dot"></span>文章のトーン</label>
      <div class="tone-group" id="toneGroup">
        <div class="tone-chip active" data-tone="体験談風・リアル">体験談風・リアル</div>
        <div class="tone-chip" data-tone="論理的・解説系">論理的・解説系</div>
        <div class="tone-chip" data-tone="ゆるい・友達口調">ゆるい・友達口調</div>
        <div class="tone-chip" data-tone="煽り気味・刺さる系">煽り気味・刺さる系</div>
        <div class="tone-chip" data-tone="丁寧・信頼感重視">丁寧・信頼感重視</div>
      </div>
    </div>

    <button class="btn" id="generateBtn" onclick="generate()">
      <span class="btn-text">✦ 記事を生成する</span>
      <div class="spinner"></div>
    </button>

    <div class="error-msg" id="errorMsg"></div>
  </div>

  <div class="result-card" id="resultCard">
    <div class="result-header">
      <span class="result-label">Generated Article</span>
      <button class="copy-btn" onclick="copyText()">コピー</button>
    </div>
    <div class="result-body" id="resultBody"></div>
  </div>

</div>

<script>
  // Tone chips
  let selectedTone = '体験談風・リアル';
  document.querySelectorAll('.tone-chip').forEach(chip => {
    chip.addEventListener('click', () => {
      document.querySelectorAll('.tone-chip').forEach(c => c.classList.remove('active'));
      chip.classList.add('active');
      selectedTone = chip.dataset.tone;
    });
  });

  async function generate() {
    const product = document.getElementById('product').value.trim();
    const target = document.getElementById('target').value;
    const features = document.getElementById('features').value.trim();
    const afflink = document.getElementById('afflink').value.trim();
    const length = document.getElementById('length').value;
    const errorMsg = document.getElementById('errorMsg');

    errorMsg.classList.remove('visible');

    if (!product) {
      errorMsg.textContent = '商品名を入力してください';
      errorMsg.classList.add('visible');
      return;
    }
    if (!afflink) {
      errorMsg.textContent = 'アフィリリンクを入力してください';
      errorMsg.classList.add('visible');
      return;
    }

    const btn = document.getElementById('generateBtn');
    btn.classList.add('loading');
    btn.disabled = true;

    const lengthMap = {
      short: '500字程度のコンパクトな記事',
      medium: '1000字程度のブログ記事',
      long: '1500字程度のnote向け記事'
    };

    const prompt = `あなたはアフィリエイト記事の専門ライターです。以下の情報をもとに、自然でリアルな${lengthMap[length]}を書いてください。

【商品・サービス名】${product}
【ターゲット読者】${target}
【特徴・売りポイント】${features || '一般的な特徴'}
【文章のトーン】${selectedTone}
【アフィリリンクURL】${afflink}

条件：
- 記事の中で自然な流れでアフィリリンクを1〜2回埋め込む（例：[こちらから無料で試せます](URL) などの形式）
- タイトル（見出し）から書き始める
- 押し付けがましくなく、読者の悩みに寄り添う内容にする
- 実際に使った人が書いたような自然さを出す
- 最後にCTA（行動喚起）を入れる
- マークダウン形式で書く（# 見出し、## 小見出し など）`;

    try {
      const response = await fetch('https://api.anthropic.com/v1/messages', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          model: 'claude-haiku-4-5-20251001',
          max_tokens: 1000,
          messages: [{ role: 'user', content: prompt }]
        })
      });

      const rawText = await response.text();
      console.log('API raw response:', rawText);

      let data;
      try {
        data = JSON.parse(rawText);
      } catch (parseErr) {
        throw new Error('JSON解析失敗 (status=' + response.status + '): ' + rawText.slice(0, 200));
      }

      if (!response.ok) {
        const msg = data?.error?.message || rawText.slice(0, 300);
        throw new Error('APIエラー(' + response.status + '): ' + msg);
      }

      const text = (data.content || []).map(b => b.text || '').join('');

      if (!text) throw new Error('テキストが空です。レスポンス: ' + JSON.stringify(data).slice(0, 200));

      document.getElementById('resultBody').textContent = text;
      document.getElementById('resultCard').classList.add('visible');
      document.getElementById('resultCard').scrollIntoView({ behavior: 'smooth', block: 'start' });

    } catch (e) {
      errorMsg.textContent = 'エラー: ' + e.message;
      errorMsg.classList.add('visible');
    }

    btn.classList.remove('loading');
    btn.disabled = false;
  }

  function copyText() {
    const text = document.getElementById('resultBody').textContent;
    navigator.clipboard.writeText(text).then(() => {
      const btn = document.querySelector('.copy-btn');
      btn.textContent = '✓ コピーしました';
      setTimeout(() => btn.textContent = 'コピー', 2000);
    });
  }
</script>
</body>
</html>
